name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────
  # STAGE 1: BUILD
  # ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ─────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run tests
        run: mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ─────────────────────────────
  # STAGE 3: DEPLOY
  # ─────────────────────────────
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar

      - name: Copy JAR to Azure VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "*.jar"
          target: "/home/${{ secrets.AZURE_VM_USER }}/app"

      - name: Start application on Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            # Kill old process if running
            pkill -f 'queue-management' || true
            pkill -f 'java' || true
            sleep 3

            # Make sure app folder exists
            mkdir -p /home/${{ secrets.AZURE_VM_USER }}/app

            # Go to app folder
            cd /home/${{ secrets.AZURE_VM_USER }}/app

            # Start the app in background, fully detached
            nohup java -jar *.jar --server.port=8080 > app.log 2>&1 &
            disown

            # Give it a moment to start
            sleep 5

            # Verify it started
            if pgrep -f 'queue-management' > /dev/null; then
              echo "Application started successfully"
            else
              echo "App may still be starting, check app.log"
            fi
