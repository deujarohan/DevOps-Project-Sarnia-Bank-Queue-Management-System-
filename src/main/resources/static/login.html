<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — QueueFlow</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: #f4f1ec;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: white;
        border: 1px solid #e5e1d8;
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
      }
      .logo {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .logo span {
        color: #4361ee;
      }
      .subtitle {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 2rem;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #6b7280;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        border: 1.5px solid #e5e1d8;
        border-radius: 10px;
        font-size: 15px;
        font-family: "DM Sans", sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #4361ee;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.12);
      }
      .btn {
        width: 100%;
        padding: 13px;
        background: #4361ee;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        font-family: "DM Sans", sans-serif;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #2d4fd6;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 1rem;
      }
      .back {
        text-align: center;
        margin-top: 1rem;
        font-size: 13px;
        color: #6b7280;
      }
      .back a {
        color: #4361ee;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">Queue<span>Flow</span></div>
      <div class="subtitle">Admin access only</div>

      <div class="error" id="error-msg" style="display: none">
        Invalid username or password. Please try again.
      </div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>
        <button type="submit" class="btn">Sign in to Admin</button>
      </form>

      <div class="back"><a href="/index.html">← Back to queue</a></div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error")) {
        document.getElementById("error-msg").style.display = "block";
      }
    </script>
  </body>
</html>
